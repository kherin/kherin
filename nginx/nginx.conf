worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_tokens       off;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml image/svg+xml
        font/truetype font/opentype font/woff2;

    # ── Upstream Astro server ─────────────────────────────────────────────────
    upstream astro {
        server web:4321;
        keepalive 32;
    }

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ─────────────────────────────────────────────────────────────────────────
    # HTTP → HTTPS redirect + www → apex redirect
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name kherin.com www.kherin.com;

        # Let's Encrypt ACME challenge (leave HTTP for cert renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/letsencrypt;
        }

        # Everything else → HTTPS
        location / {
            return 301 https://kherin.com$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # www → apex HTTPS redirect
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name www.kherin.com;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        return 301 https://kherin.com$request_uri;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Main HTTPS server
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name kherin.com;

        # ── TLS ──────────────────────────────────────────────────────────────
        ssl_certificate      /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key  /etc/nginx/ssl/privkey.pem;
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  10m;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_stapling         on;
        ssl_stapling_verify  on;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                                     always;
        add_header X-Frame-Options           "SAMEORIGIN"                                  always;
        add_header X-XSS-Protection          "1; mode=block"                               always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"             always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"    always;

        # Content-Security-Policy
        add_header Content-Security-Policy
            "default-src 'self'; "
            "script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com; "
            "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; "
            "font-src 'self' https://fonts.gstatic.com; "
            "img-src 'self' data: https:; "
            "connect-src 'self'; "
            "frame-ancestors 'none';"
            always;

        # ── Astro static assets (served with long cache) ─────────────────────
        location /_astro/ {
            proxy_pass         http://astro;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            expires            1y;
            add_header         Cache-Control "public, immutable";
        }

        # ── Public static files ───────────────────────────────────────────────
        location ~* \.(ico|svg|png|jpg|jpeg|gif|webp|woff|woff2|ttf|otf|pdf|txt|xml|webmanifest)$ {
            proxy_pass http://astro;
            expires    30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        # ── Keystatic admin — restrict to localhost or VPN IPs if needed ─────
        location /keystatic {
            # Uncomment to restrict to specific IPs:
            # allow 127.0.0.1;
            # deny all;
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://astro;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/keystatic {
            limit_req zone=api burst=30 nodelay;
            proxy_pass         http://astro;
            proxy_http_version 1.1;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── All other requests → Astro SSR ────────────────────────────────────
        location / {
            proxy_pass         http://astro;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
        }

        # ── Error pages ───────────────────────────────────────────────────────
        error_page 404 /404;
        error_page 500 502 503 504 /500;
    }
}
