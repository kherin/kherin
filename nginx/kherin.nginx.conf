# ── kherin.com — host nginx site config ──────────────────────────────────────
# Deploy: sudo cp /home/deploy/kherin/nginx/kherin.nginx.conf /etc/nginx/sites-available/kherin
#         sudo ln -s /etc/nginx/sites-available/kherin /etc/nginx/sites-enabled/kherin
#         sudo nginx -t && sudo systemctl reload nginx

# Must be in http context (sites-available files are included inside http {})
limit_req_zone $binary_remote_addr zone=kherin_api:10m rate=10r/s;

# HTTP — redirect everything to HTTPS (Certbot also uses this for ACME challenges)
server {
    listen 80;
    server_name kherin.com www.kherin.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://kherin.com$request_uri;
    }
}

# www → apex HTTPS redirect
server {
    listen 443 ssl http2;
    server_name www.kherin.com;

    ssl_certificate     /etc/letsencrypt/live/kherin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kherin.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://kherin.com$request_uri;
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name kherin.com;

    ssl_certificate     /etc/letsencrypt/live/kherin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kherin.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                     always;
    add_header X-Frame-Options           "SAMEORIGIN"                                  always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"             always;

    # ── Astro static assets (long cache) ─────────────────────────────────────
    location /_astro/ {
        proxy_pass         http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        expires            1y;
        add_header         Cache-Control "public, immutable";
    }

    # ── Public static files ───────────────────────────────────────────────────
    location ~* \.(ico|svg|png|jpg|jpeg|gif|webp|woff|woff2|ttf|otf|pdf|txt|xml|webmanifest)$ {
        proxy_pass http://127.0.0.1:4321;
        expires    30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── Keystatic admin ───────────────────────────────────────────────────────
    location /keystatic {
        limit_req zone=kherin_api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/keystatic {
        limit_req zone=kherin_api burst=30 nodelay;
        proxy_pass         http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Dozzle log viewer (basic auth protected) ──────────────────────────────
    location /dozzle/ {
        auth_basic           "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd_dozzle;
        proxy_pass           http://127.0.0.1:9999;
        proxy_http_version   1.1;
        proxy_set_header     Upgrade    $http_upgrade;
        proxy_set_header     Connection "upgrade";
        proxy_set_header     Host       $host;
        proxy_set_header     X-Real-IP  $remote_addr;
        proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header     X-Forwarded-Proto $scheme;
        # Required for SSE (log streaming)
        proxy_buffering      off;
        proxy_cache          off;
        proxy_read_timeout   3600s;
    }

    # ── All other requests → Astro SSR ────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    error_page 404 /404;
    error_page 500 502 503 504 /500;
}
